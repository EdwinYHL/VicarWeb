{% extends "Base.html" %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2><i class="bi bi-car-front"></i> Lista de Vehículos</h2>
    <a href="{{ url_for('VehicleAdd') }}" class="btn btn-success"><i class="bi bi-plus-circle"></i> Nuevo Vehículo</a>
</div>
<div class="table-responsive">
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr><th>ID</th><th>Marca/Modelo</th><th>Año</th><th>Placa</th><th>Estado</th><th>Acciones</th></tr>
        </thead>
        <tbody>
            {% for v in vehicles %}
            <tr>
                <td>{{ v.id }}</td>
                <td>{{ v.brand }} {{ v.model }}</td>
                <td>{{ v.year }}</td>
                <td>{{ v.plate }}</td>
                <td><span class="badge bg-{% if v.status == 'Disponible' %}success{% elif v.status == 'Rentado' %}warning{% else %}danger{% endif %}">{{ v.status }}</span></td>
                <td>
                    <a href="{{ url_for('VehicleEdit', id=v.id) }}" class="btn btn-sm btn-info"><i class="bi bi-pencil"></i></a>
                    <a href="{{ url_for('VehicleDelete', id=v.id) }}" class="btn btn-sm btn-danger" onclick="return confirm('¿Eliminar vehículo?')"><i class="bi bi-trash"></i></a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
